name: CI

# Push trigger is intentionally not scoped to `main` right now — deploying every
# pushed branch to GitHub Pages so the site is viewable on mobile while still
# in progress. Once this settles onto `main` as the usual workflow, tighten
# `on.push.branches` back down to `[main]`.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      - name: Generate static site
        run: pnpm generate
        env:
          # This repo isn't a `<user>.github.io` repo, so Pages serves it from
          # a subpath (https://<user>.github.io/<repo>/) — bake that into the
          # build. Drop this once a custom domain (CNAME) is configured.
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/

      - uses: actions/upload-pages-artifact@v3
        if: github.event_name == 'push'
        with:
          path: .output/public

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
