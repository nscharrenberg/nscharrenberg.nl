name: CI

# Lint/typecheck/test/build run on every push and PR as a validation gate.
# The actual "Deploy to gh-pages" step below is further scoped to pushes on
# `main` only, so feature branches build but never touch the live site.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a commit SHA rather than the
      # mutable `v4` tag — if a tag were ever repointed (this exact supply-
      # chain attack has happened to real projects), a floating tag would
      # execute whatever it now points to. A pinned SHA can't move.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      - name: Generate static site
        run: pnpm generate
        env:
          # This repo isn't a `<user>.github.io` repo, so Pages serves it from
          # a subpath (https://<user>.github.io/<repo>/) — bake that into the
          # build. Drop both of these once the real nscharrenberg.nl domain
          # is live (CNAME + DNS + Pages custom domain setting):
          # NUXT_PUBLIC_SITE_URL then falls back to the permanent domain
          # already set in nuxt.config.ts, and every URL that's derived from
          # it (sitemap, robots.txt, canonical, JSON-LD, OG/Twitter images)
          # updates with it — nothing else in the codebase to touch.
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/
          NUXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Upload build output
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site
          path: ./.output/public
          retention-days: 1

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Only this job needs write access to push to gh-pages — lint/typecheck/
    # test/build above run with the read-only default from the top of this
    # file, so a compromised or misbehaving dependency invoked during those
    # steps can't push anywhere.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site
          path: ./public

      # Publishes straight to the gh-pages branch instead of GitHub's Pages
      # "environment" — the environment route (actions/deploy-pages) kept
      # getting blocked by environment protection rules that weren't
      # controllable from here. This path is a plain branch push, so it has
      # no such gate. Repo Settings → Pages → Source must be set to
      # "Deploy from a branch" → gh-pages → / (root) for this to serve.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
