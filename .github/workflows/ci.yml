name: CI

# Lint/typecheck/test/build run on every push and PR as a validation gate.
# The actual "Deploy to gh-pages" step below is further scoped to pushes on
# `main` only, so feature branches build but never touch the live site.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Third-party actions are pinned to a commit SHA rather than the
      # mutable `v4` tag — if a tag were ever repointed (this exact supply-
      # chain attack has happened to real projects), a floating tag would
      # execute whatever it now points to. A pinned SHA can't move.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      - name: Generate static site
        run: pnpm generate
        env:
          # This repo isn't a `<user>.github.io` repo, so Pages serves it from
          # a subpath (https://<user>.github.io/<repo>/) — bake that into the
          # build. Drop this once a custom domain (CNAME) is configured.
          NUXT_APP_BASE_URL: /${{ github.event.repository.name }}/

      # Publishes straight to the gh-pages branch instead of GitHub's Pages
      # "environment" — the environment route (actions/deploy-pages) kept
      # getting blocked by environment protection rules that weren't
      # controllable from here. This path is a plain branch push, so it has
      # no such gate. Repo Settings → Pages → Source must be set to
      # "Deploy from a branch" → gh-pages → / (root) for this to serve.
      - name: Deploy to gh-pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.output/public
